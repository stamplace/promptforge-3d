<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>PromptForge 3D Mobile</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#04070d;
      color:white;
      font-family:system-ui,-apple-system,Segoe UI,sans-serif;
      touch-action:none;
    }
    .app{
      width:100vw;
      height:100dvh;
      max-height:100dvh;
      display:grid;
      grid-template-rows:auto minmax(0,1fr);
      background:
        radial-gradient(circle at 50% -8%,rgba(34,255,153,.28),transparent 30%),
        radial-gradient(circle at 85% 8%,rgba(124,58,237,.24),transparent 28%),
        linear-gradient(180deg,#071522 0%,#04070d 58%,#020307 100%);
      padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
    }
    .top{
      display:grid;
      gap:8px;
      padding:8px 2px 8px;
      z-index:4;
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      direction:ltr;
    }
    h1{
      margin:0;
      font-size:22px;
      line-height:1;
      letter-spacing:-.04em;
      direction:ltr;
    }
    .pill{
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.07);
      border-radius:999px;
      padding:6px 10px;
      color:#dce8f4;
      font-size:12px;
      direction:ltr;
    }
    .prompt-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      align-items:stretch;
      direction:rtl;
    }
    textarea{
      width:100%;
      height:58px;
      border:1px solid rgba(92,142,171,.55);
      border-radius:20px;
      background:rgba(3,10,18,.72);
      color:white;
      padding:10px 12px;
      font-size:15.5px;
      line-height:1.35;
      outline:none;
      resize:none;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.035);
    }
    button{
      border:0;
      border-radius:20px;
      padding:0 16px;
      min-width:88px;
      font-weight:950;
      background:#22ff99;
      color:#03100a;
      font-size:15px;
      box-shadow:0 12px 34px rgba(34,255,153,.24);
    }
    .tagline{
      direction:rtl;
      color:#eafff5;
      font-size:13px;
      line-height:1.25;
      opacity:.92;
      background:linear-gradient(90deg,rgba(34,255,153,.13),rgba(124,58,237,.12));
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      padding:8px 11px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    #dna{
      display:flex;
      gap:6px;
      overflow-x:auto;
      direction:rtl;
      scrollbar-width:none;
      padding-bottom:1px;
    }
    #dna::-webkit-scrollbar{display:none}
    .atom{
      flex:0 0 auto;
      display:flex;
      gap:6px;
      align-items:center;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      color:#dce8f4;
      white-space:nowrap;
    }
    .dot{
      width:6px;
      height:6px;
      border-radius:999px;
      background:#22ff99;
      box-shadow:0 0 12px #22ff99;
      flex:0 0 auto;
    }
    #stage{
      position:relative;
      min-height:0;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      background:#03050a;
      box-shadow:
        inset 0 0 0 1px rgba(34,255,153,.05),
        0 18px 60px rgba(0,0,0,.38);
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
    .hud{
      position:absolute;
      top:12px;
      left:12px;
      right:12px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      pointer-events:none;
      direction:ltr;
      z-index:2;
    }
    .badge{
      background:rgba(0,0,0,.58);
      border:1px solid rgba(255,255,255,.16);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      backdrop-filter:blur(10px);
      max-width:58%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    #title{direction:rtl;text-align:right}
    #score{direction:ltr;unicode-bidi:plaintext}
    .hint{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      pointer-events:none;
      z-index:2;
      color:#dce8f4;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      padding:9px 13px;
      font-size:13px;
      backdrop-filter:blur(10px);
      white-space:nowrap;
    }
    .flash{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at center,rgba(34,255,153,.22),transparent 42%);
      opacity:0;
      transition:opacity .18s ease;
      z-index:1;
    }
    .flash.on{opacity:1}
    .center-card{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:3;
      width:min(82%,320px);
      text-align:center;
      background:rgba(0,0,0,.48);
      border:1px solid rgba(255,255,255,.16);
      border-radius:28px;
      padding:22px 18px;
      backdrop-filter:blur(16px);
      box-shadow:0 18px 70px rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .22s ease, transform .22s ease;
    }
    .center-card.show{
      opacity:1;
      transform:translate(-50%,-50%) scale(1);
    }
    .center-kicker{font-size:13px;color:#b8c7d9;margin-bottom:7px}
    .center-title{font-size:48px;font-weight:950;letter-spacing:-.06em}
    .center-sub{font-size:14px;color:#dce8f4;margin-top:4px}
  </style>
</head>
<body>
  <div class="app">
    <section class="top">
      <div class="brand">
        <h1 id="gameName">PromptForge 3D</h1>
        <div class="pill">v0.8 publish</div>
      </div>

      <div class="prompt-row">
        <textarea id="prompt">משחק חלל מהיר עם אנרגיה ירוקה ומכשולים סגולים בניאון</textarea>
        <button id="forge">פתח</button>
      </div>

      <div class="tagline" id="tagline">כתוב משחק. שחק בו עכשיו.</div>
      <div id="dna">
        <div class="atom"><span class="dot"></span><span>חוויה אחת מושלמת למובייל</span></div>
      </div>
    </section>

    <section id="stage">
      <div class="hud">
        <div class="badge" id="score">🎯 0/24 · ❤️ 3</div>
        <div class="badge" id="title">מוכן</div>
      </div>
      <div class="flash" id="flash"></div>
      <div class="center-card" id="centerCard">
        <div class="center-kicker">המשחק שלך מוכן</div>
        <div class="center-title" id="centerTitle">3</div>
        <div class="center-sub" id="centerSub">גרור אצבע על הזירה</div>
      </div>
      <div class="hint" id="hint">גרור אצבע על הזירה</div>
    </section>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
