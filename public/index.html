<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>PromptForge 3D</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#05060a;color:white;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    body{overflow:hidden}
    .app{height:100vh;display:grid;grid-template-rows:auto 1fr;background:
      radial-gradient(circle at 50% -10%,rgba(34,255,153,.24),transparent 34%),
      radial-gradient(circle at 90% 10%,rgba(124,58,237,.2),transparent 28%),
      linear-gradient(180deg,#07111c 0%,#05060a 52%,#020307 100%)}
    .top{padding:12px 14px 10px;display:grid;gap:9px}
    .brand{display:flex;align-items:end;justify-content:space-between;gap:10px}
    h1{margin:0;font-size:24px;letter-spacing:-.04em}
    .sub{color:#b8c7d9;font-size:13px}
    .pill{direction:ltr;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);border-radius:999px;padding:6px 10px;color:#dce8f4;font-size:12px}
    textarea{width:100%;min-height:82px;border:1px solid #24485d;border-radius:22px;background:rgba(3,10,18,.78);color:white;padding:14px;font-size:17px;line-height:1.45;outline:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
    button{border:0;border-radius:20px;padding:14px 18px;font-weight:950;background:#22ff99;color:#03100a;font-size:17px;box-shadow:0 12px 34px rgba(34,255,153,.25)}
    #dna{display:grid;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:10px 12px;font-size:12.5px;color:#dce8f4;max-height:82px;overflow:auto}
    .atom{display:flex;gap:6px;align-items:center}
    .dot{width:6px;height:6px;border-radius:999px;background:#22ff99;box-shadow:0 0 12px #22ff99}
    #stage{position:relative;min-height:0;border-top:1px solid #183247;overflow:hidden}
    canvas{width:100%;height:100%;display:block;touch-action:none}
    .hud{position:absolute;inset:12px;pointer-events:none;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .badge{background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 12px;font-size:13px;backdrop-filter:blur(8px)}
    #score{direction:ltr;unicode-bidi:plaintext}
    .controls{position:absolute;bottom:14px;left:14px;right:14px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;direction:ltr}
    .controls button{pointer-events:auto;background:rgba(255,255,255,.13);color:white;backdrop-filter:blur(10px);box-shadow:none;border:1px solid rgba(255,255,255,.12);font-size:22px}
    .controls button:active{background:rgba(34,255,153,.35);box-shadow:0 0 34px rgba(34,255,153,.35)}
    #fire{background:rgba(34,255,153,.22);color:#eafff5;font-size:18px}
  </style>
</head>
<body>
  <div class="app">
    <section class="top">
      <div class="brand">
        <div>
          <h1>PromptForge 3D</h1>
          <div class="sub">כתוב משחק. שחק בו עכשיו.</div>
        </div>
        <div class="pill">v0.2 local</div>
      </div>

      <textarea id="prompt">משחק חלל מהיר עם קובייה ירוקה שאוספת אנרגיה ובורחת ממכשולים סגולים בניאון</textarea>
      <button id="forge">פתח את המשחק שלי</button>
      <div id="dna"><div class="atom"><span class="dot"></span><span>המילים שלך יהפכו לעולם משחק חי.</span></div></div>
    </section>

    <section id="stage">
      <div class="hud">
        <div class="badge" id="title">מוכן</div>
        <div class="badge" id="score">0 / 0</div>
      </div>
      <div class="controls">
        <button id="left">◀</button>
        <button id="up">▲</button>
        <button id="right">▶</button>
        <button id="fire">אש</button>
      </div>
    </section>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
